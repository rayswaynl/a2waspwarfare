name: WASP CI

on:
  pull_request:
    branches:
      - claude/build84-cmdcon36
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tooling:
    name: Tooling and report-only audits
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Python unit tests
        shell: pwsh
        run: |
          python Tools\Lint\test_check_sqf.py
          python Tools\Lint\test_fpv_purchase_authority.py
          python Tools\Lint\test_check_stringtable_refs.py
          python Tools\Soak\test_analyze_soak.py
          python Tools\Pack\test_pack_pbo.py

      - name: Soak analyzer sample smoke
        shell: pwsh
        run: |
          python Tools\Soak\analyze_soak.py Tools\Soak\sample_build86.rpt --json > $env:RUNNER_TEMP\wasp_soak_sample.json
          Get-Item $env:RUNNER_TEMP\wasp_soak_sample.json

      - name: MatchReport tests or syntax smoke
        shell: pwsh
        run: |
          $tests = @(Get-ChildItem -Path Tools\MatchReport -Recurse -File -Filter "test_*.py" -ErrorAction SilentlyContinue)
          if ($tests.Count -gt 0) {
            foreach ($test in $tests) {
              python $test.FullName
            }
          } else {
            python -m compileall -q Tools\MatchReport
          }

      - name: Build LoadoutManager
        shell: pwsh
        run: |
          dotnet build Tools\LoadoutManager\LoadoutManager.csproj -c RELEASE

      - name: SQF lint report (advisory)
        shell: pwsh
        continue-on-error: true
        run: |
          python Tools\Lint\check_sqf.py --no-classname-index

      - name: SQF lint gate (blocking)
        shell: pwsh
        # Codes that are currently zero-findings on master and are high-confidence.
        # A3CMD now BLOCKING: its only 2 findings were "class Params" false positives,
        # now annotated with `// noqa: A3CMD` in Rsc/Parameters.hpp (all 3 terrains).
        # A3MARKER/GROUPGETVAR/DISABLESER excluded: active findings in codebase.
        # PUBVARSV + MILMARKER excluded: bugs pending in PR #738 + PR #742;
        # add both to blocking after those merge.
        # PUBVARSV detail: Server_AttackWave.sqf pending in PR #738
        # (fable/attackwave-jip-nilguards); add PUBVARSV here after that merges.
        run: |
          python Tools\Lint\check_sqf.py `
            --select A3CMD,A3HASH,A3PRIVATE,A3REVEAL,A3SELECT,A3SORT,A3STRING,BOOLCMP,BRACKET,NSSETVAR3 `
            --no-classname-index

      - name: Agent docs sync check
        shell: pwsh
        run: |
          pwsh Tools\Test-AgentDocsSync.ps1

      - name: Stringtable reference report
        shell: pwsh
        run: |
          python Tools\Lint\check_stringtable_refs.py --exit-zero

      - name: Mirror drift report (TK + ZG)
        shell: pwsh
        continue-on-error: true
        env:
          A2WASP_SKIP_ZIP: "1"
        run: |
          dotnet run -c RELEASE --project Tools\LoadoutManager -- --check

      # --- PowerShell tool tests (roadmap #01) ---
      # All scripts are plain-assertion (no Pester); each exits 0 on pass, 1 on fail.
      # Every script in the blocking step was run locally and confirmed passing (2026-07-06).

      - name: PowerShell tool tests (blocking)
        shell: pwsh
        # Test-WaspVersionTemplates: guards WF_DEBUG, WASPRELEASE marker, and map/naval
        # defines on all three terrain templates. Template drift is a recurring defect —
        # confirmed PASS on this branch, wired blocking.
        # Set-MissionTemplate.Tests, Set-WaspCpuAffinity.Tests, Get-WindowedRpt.Tests,
        # RptParsing.Tests: dependency-free unit-test wrappers. All confirmed PASS locally.
        run: |
          pwsh Tools\Ops\Test-WaspVersionTemplates.ps1
          pwsh Tools\Ops\Set-MissionTemplate.Tests.ps1
          pwsh Tools\Ops\Set-WaspCpuAffinity.Tests.ps1
          pwsh Tools\Monitor\Get-WindowedRpt.Tests.ps1
          pwsh Tools\RptParsing\RptParsing.Tests.ps1

      - name: PowerShell tool tests (advisory)
        shell: pwsh
        continue-on-error: true
        # Test-WaspSlotCountConsistency.Tests.ps1: the fixture wrapper passes (tests tool
        # logic), but the live repo has TK and ZG WF_MAXPLAYERS=61 vs 34 playable sqm slots.
        # TODO: confirm TK/ZG 61-vs-34 slot mismatch intentional, then move to blocking step.
        # Test-WaspRptMarkerSweep.SelfTest.ps1: passed locally; advisory as a precaution
        # against runner environment differences (spawns a sub-process for the sweep tool).
        run: |
          pwsh Tools\Ops\Test-WaspSlotCountConsistency.Tests.ps1
          pwsh Tools\Monitor\Test-WaspRptMarkerSweep.SelfTest.ps1

      # --- BugHunt heuristics (roadmap #08) ---

      - name: BugHunt heuristics (advisory)
        shell: pwsh
        continue-on-error: true
        # Heuristic static scan of the Chernarus mission tree. Always advisory — findings
        # are leads to eyeball, not proven bugs.
        # A3-only command rule (Rule 1) is disabled inside the script: it duplicates
        # check_sqf.py A3CMD (same command list, same tree) and would double-report every
        # A3CMD finding. Active rules: off-by-one ascending loops, descending loops missing
        # 'step -1', nil-hazard getVariable negation/arithmetic, missing compiled file paths.
        run: |
          pwsh Tools\PrTestHarness\BugHunt\Find-WaspBugHunt.ps1 -All -MinSeverity medium
